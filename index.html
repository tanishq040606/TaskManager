<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - To-Do List</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div class="container">

        <h1><i class="fa-solid fa-list-check"></i> TaskMaster</h1>

        <!-- Search Box -->
        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Search tasks...">
        </div>

        <!-- Add Task -->
        <div class="input-section">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task">
            <input type="datetime-local" id="taskDate">
            <button id="addTaskBtn">
                <i class="fa-solid fa-plus"></i> Add
            </button>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">
                All
            </button>

            <button class="filter-btn" data-filter="pending">
                Pending
            </button>

            <button class="filter-btn" data-filter="completed">
                Completed
            </button>
        </div>

        <!-- Task List -->
        <ul id="taskList">
            <!-- JavaScript will insert tasks here -->
        </ul>

        <!-- Statistics -->
        <div class="stats">

            <div class="card">
                <h3>Total</h3>
                <p id="totalTasks">0</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p id="completedTasks">0</p>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <p id="pendingTasks">0</p>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
